<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <header>
        <div class="heading">
            <h1>Rock Paper Scissor</h1>
        </div>
    </header>
    <main>
        <div class="choice-container">
            <div id="rock" class="choices"><img src="others/rock.png" alt="rock"></div>
            <div id="paper" class="choices"><img src="others/paper.jpg" alt="paper"></div>
            <div id="scissor" class="choices"><img src="others/scissor.jpg" alt="scissor"></div>
        </div>
        <div class="score-board-container">
            <div class="score-board">
                <div class="user-score">
                    <p id="US" class="number">0</p>
                    <p>User</p>
                </div>
                <div class="comp-score">
                    <p id="CS" class="number">0</p>
                    <p>Computer</p>
                </div>
            </div>
        </div>
        <div class="result-box-container">
            <div class="result-box">
                <p id="msg">Click on the cards to play</p>
            </div>
        </div>
    </main>
    <script src="scripts/script.js"></script>
</body>

</html>
